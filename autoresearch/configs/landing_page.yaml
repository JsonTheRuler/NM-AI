# Autoresearch config — Homepage optimization
# EasyEiendom (easyeiendom.no) — AI platform for real estate brokers

project_name: "easyeiendom-homepage"

input_path: "./content/homepage.txt"

content_type: "landing_page"
content_context: |
  Homepage for easyeiendom.no — an AI platform for Norwegian real estate
  brokers (eiendomsmeglere). Three products: Broker AI (voice AI assistant
  for viewings/inspections), BoligMatch AI (AI buyer-property matching,
  white-label), and Byggesøknader (digital building permit applications).
  Target audience: real estate brokers and brokerage firms in Norway.
  Main competitors: traditional tools, manual processes, Finn.no for buyers.
  All copy is in Norwegian. The page should convince brokers and brokerage
  firm leaders to book a demo.

# Quality checklist — 6 yes/no questions calibrated to actual content
checklist:
  - "Does the headline immediately communicate the specific problem meglere face (wasting time on non-selling tasks)?"
  - "Is every CTA specific and action-oriented (e.g. 'Book demo', 'Ring oss') rather than generic ('Lær mer', 'Kom i gang', 'Les mer')?"
  - "Does the page clearly differentiate the three products (Broker AI, BoligMatch AI, Byggesøknader) with distinct value propositions?"
  - "Does the pain-point section ('Hverdagen i dag') feel urgent and relatable — using concrete scenarios a megler would recognize?"
  - "Does the page include at least two concrete metrics or statistics to build credibility (e.g. time saved, data sources, cost reduction)?"
  - "Is the copy free of filler phrases, corporate speak, and unsubstantiated superlatives?"

max_iterations: 30
target_score: 0.95
consecutive_target: 3

scorer_model: "claude-sonnet-4-20250514"
mutator_model: "claude-sonnet-4-20250514"

dashboard: true
dashboard_port: 8501
output_dir: "./output"
