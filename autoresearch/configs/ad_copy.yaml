# Autoresearch config — Ad Copy optimization
# For Google Ads, Facebook Ads, LinkedIn Ads etc.

project_name: "easyeiendom-ads"

input_path: "./ad_content.txt"

content_type: "ad_copy"
content_context: |
  Ad copy for Easy Eiendom (easyeiendom.no), an AI platform for Norwegian
  real estate brokers. Three products: Broker AI (voice AI assistant for
  viewings), BoligMatch AI (AI buyer-property matching, white-label), and
  Byggesøknader (digital building permits). Target: real estate brokers
  and brokerage firm leaders in Norway. Ads run on Google Search, Facebook,
  and LinkedIn. Key pain points: losing inspections to better-prepared
  competitors, wrong buyers at viewings, sales falling through due to
  building permit issues. Tone: direct, confident, no corporate fluff.

checklist:
  - "Does the headline include a specific benefit or result (not just a feature)?"
  - "Is the copy under 90 words (concise enough for ad formats)?"
  - "Does it include a clear, action-oriented CTA with a specific verb?"
  - "Does it address a specific pain point in the first sentence?"
  - "Is it free of superlatives and unsubstantiated claims ('best', 'leading', '#1')?"

max_iterations: 30
target_score: 0.95
consecutive_target: 3

scorer_model: "claude-sonnet-4-20250514"
mutator_model: "claude-sonnet-4-20250514"

dashboard: true
dashboard_port: 8506
output_dir: "./output"
