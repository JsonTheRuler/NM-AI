# Autoresearch config — Newsletter/Email optimization

project_name: "easyeiendom-newsletter"

input_path: "./newsletter_content.txt"

content_type: "newsletter"
content_context: |
  Email newsletter for Easy Eiendom's audience of Norwegian real estate
  brokers. Products: Broker AI (voice AI for viewings), BoligMatch AI
  (buyer matching), Byggesøknader (building permits). Goal: drive demo
  bookings, platform awareness, and engagement. Tone: direct, helpful,
  no corporate speak. Written in Norwegian. The reader is a busy megler
  who skims emails on their phone between viewings.

checklist:
  - "Does the subject line / opener create curiosity or urgency without being clickbait?"
  - "Does the first paragraph include a personal or relatable detail a megler would recognize?"
  - "Is the email under 200 words (scannable, not a wall of text)?"
  - "Is there exactly one clear CTA (not multiple competing actions)?"
  - "Is it free of cliche phrases ('I dagens marked', 'Vi er stolte av å', 'Spennende nyheter')?"

max_iterations: 30
target_score: 0.95
consecutive_target: 3

scorer_model: "claude-sonnet-4-20250514"
mutator_model: "claude-sonnet-4-20250514"

dashboard: true
dashboard_port: 8507
output_dir: "./output"
